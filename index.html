<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萌账 AI v7.0 - 微信账单专项版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); font-family: 'Segoe UI', system-ui, sans-serif; }
        .loading-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body id="body-bg" class="bg-blue-50 flex h-screen text-gray-800 overflow-hidden">

    <aside class="w-80 bg-white shadow-2xl flex flex-col p-6 border-r border-blue-50 z-10">
        <div class="text-2xl font-black mb-8 text-blue-600 tracking-tight">💰 萌账 AI v7.0</div>
        <div class="space-y-6">
            <div>
                <label class="text-xs text-gray-400 uppercase font-bold tracking-widest">DeepSeek API Key</label>
                <input type="password" id="api-key" placeholder="在此粘贴 Key" class="w-full mt-2 p-3 text-sm border rounded-xl outline-none focus:ring-2 focus:ring-blue-400 bg-gray-50">
            </div>
            <div>
                <label class="text-xs text-gray-400 uppercase font-bold tracking-widest">月度预算上限</label>
                <input type="number" id="budget-limit" value="5000" class="w-full mt-2 p-2 text-2xl font-bold border-b-2 border-blue-200 outline-none">
            </div>
            <div class="p-4 bg-yellow-50 rounded-2xl text-xs text-yellow-700 leading-relaxed border border-yellow-100">
                💡 <b>温馨提示：</b><br>
                1. 微信导出的 Excel 若有密码，请先用电脑打开并保存一次以去除密码。<br>
                2. 本版本已适配微信账单顶部的冗余信息过滤。
            </div>
        </div>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <header id="header-card" class="bg-white p-10 rounded-[40px] shadow-sm mb-10 border-b-[12px] border-blue-500 transition-all duration-700">
            <h2 class="text-gray-400 font-medium mb-1 text-sm uppercase tracking-widest">本月实际支出统计</h2>
            <div class="flex items-end gap-6">
                <span id="total-amount" class="text-7xl font-black text-blue-600 leading-none">￥0.00</span>
                <div id="ai-status" class="px-5 py-2 rounded-full bg-blue-100 text-blue-600 font-bold text-sm mb-2">待命</div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <section class="bg-white p-8 rounded-[32px] shadow-sm">
                <h3 class="font-bold text-lg mb-6 tracking-tight">📂 批量导入微信账单</h3>
                <label for="file-input" class="block border-4 border-dashed border-blue-50 rounded-[24px] p-16 text-center hover:border-blue-400 hover:bg-blue-50 transition-all cursor-pointer">
                    <div class="text-5xl mb-4">📊</div>
                    <p id="upload-text" class="text-gray-500 font-medium">点击此处上传 .xlsx 账单</p>
                    <input type="file" id="file-input" class="hidden" accept=".xlsx, .xls">
                </label>
            </section>

            <section class="bg-white p-8 rounded-[32px] shadow-sm">
                <h3 class="font-bold text-lg mb-6">🧩 智能分类结果</h3>
                <div id="category-list" class="space-y-4 text-gray-400 italic text-sm text-center py-10">暂无数据</div>
            </section>
        </div>

        <div id="ai-bubble" class="mt-10 bg-white p-8 rounded-[32px] border-l-[16px] border-blue-500 shadow-lg">
            <p class="text-blue-500 font-bold text-[10px] uppercase mb-2">AI 吐槽大师</p>
            <p id="ai-comment" class="text-2xl text-gray-700 font-medium italic leading-relaxed">“把那份沉甸甸的账单丢进来，让我替你分担这份（贫穷的）忧虑。”</p>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('file-input');

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const apiKey = document.getElementById('api-key').value;
            if (!apiKey) { alert("请先填写左侧的 API Key！"); return; }

            document.getElementById('upload-text').innerText = "读取中，请稍后...";
            document.getElementById('ai-status').innerText = "AI 正在分析大数据...";
            document.getElementById('ai-status').classList.add('loading-pulse');

            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    const data = new Uint8Array(event.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                    
                    // 将表格转换为纯数组，方便处理
                    const rows = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });
                    
                    // 暴力过滤：只抓取包含“支出”字样的行，且限制 200 行以内
                    const filteredRows = rows.filter(row => {
                        const rowStr = JSON.stringify(row);
                        return rowStr.includes('支出') && !rowStr.includes('退款');
                    }).slice(0, 250);

                    if (filteredRows.length === 0) {
                        alert("没找到支出记录，请检查是否是原始微信账单。");
                        return;
                    }

                    analyzeWithAI(JSON.stringify(filteredRows), apiKey);
                } catch (err) {
                    alert("Excel 读取失败，请确保文件未加密。");
                }
            };
            reader.readAsArrayBuffer(file);
        };

        async function analyzeWithAI(processedText, apiKey) {
            const prompt = `你是一个财务AI。分析账单并返回JSON。
            1. 分类：'旅游出行'(地铁/携程/打车/12306)、'吃吃喝喝'(餐饮/外卖/超市/零食)、'其他'。
            2. 忽略所有收入和红包。
            3. JSON格式：{"total":数字, "categories":{"旅游出行":数字, "吃吃喝喝":数字, "其他":数字}, "comment":"吐槽"}
            数据：${processedText}`;

            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{role: "system", content: "只返回JSON对象"}, {role: "user", content: prompt}],
                        response_format: { type: 'json_object' }
                    })
                });
                const data = await response.json();
                updateUI(JSON.parse(data.choices[0].message.content));
            } catch (err) {
                alert("AI 接口调用失败");
            }
        }

        function updateUI(res) {
            const limit = document.getElementById('budget-limit').value;
            document.getElementById('total-amount').innerText = `￥${res.total.toFixed(2)}`;
            document.getElementById('ai-comment').innerText = `“${res.comment}”`;
            document.getElementById('ai-status').classList.remove('loading-pulse');
            document.getElementById('ai-status').innerText = "对账完成";

            const icons = { '旅游出行': '✈️', '吃吃喝喝': '🍔', '其他': '📦' };
            document.getElementById('category-list').innerHTML = Object.entries(res.categories)
                .map(([k, v]) => `
                    <div class="flex items-center justify-between p-5 bg-gray-50 rounded-2xl hover:bg-blue-50 transition-all">
                        <div class="flex items-center gap-4">
                            <span class="text-2xl">${icons[k] || '💰'}</span>
                            <span class="font-extrabold text-gray-700">${k}</span>
                        </div>
                        <span class="text-xl font-mono font-bold">￥${v.toFixed(2)}</span>
                    </div>
                `).join('');

            const isOver = res.total > limit;
            document.getElementById('body-bg').className = isOver ? "bg-orange-50 flex h-screen overflow-hidden" : "bg-blue-50 flex h-screen overflow-hidden";
            document.getElementById('header-card').style.borderColor = isOver ? "#f97316" : "#3b82f6";
            document.getElementById('total-amount').className = isOver ? "text-7xl font-black text-orange-600 leading-none" : "text-7xl font-black text-blue-600 leading-none";
        }
    </script>
</body>
</html>
