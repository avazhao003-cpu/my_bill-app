<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>萌账 AI v6.0 - 大数据量版</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { transition: all 0.5s ease; font-family: 'Segoe UI', system-ui, sans-serif; }
        .progress-bar { transition: width 0.3s ease; }
    </style>
</head>
<body id="body-bg" class="bg-blue-50 flex h-screen text-gray-800">

    <aside class="w-80 bg-white shadow-2xl flex flex-col p-6 border-r border-blue-50 z-10">
        <div class="text-2xl font-black mb-8 text-blue-600 tracking-tight">💰 萌账 AI v6.0</div>
        <div class="space-y-6">
            <div>
                <label class="text-xs text-gray-400 uppercase font-bold tracking-widest">DeepSeek API Key</label>
                <input type="password" id="api-key" placeholder="粘贴你的 Key" class="w-full mt-2 p-3 text-sm border rounded-xl outline-none focus:ring-2 focus:ring-blue-400 bg-gray-50">
            </div>
            <div>
                <label class="text-xs text-gray-400 uppercase font-bold tracking-widest">月度预算</label>
                <input type="number" id="budget-limit" value="5000" class="w-full mt-2 p-2 text-2xl font-bold border-b-2 border-blue-200 outline-none">
            </div>
            <div class="p-4 bg-blue-50 rounded-2xl text-xs text-blue-600 leading-relaxed">
                🚀 <b>已启用数据压缩：</b><br>
                支持一次读取 200+ 条交易记录。我们已过滤掉冗余信息以节省 AI 流量。
            </div>
        </div>
    </aside>

    <main class="flex-1 p-10 overflow-y-auto">
        <header id="header-card" class="bg-white p-10 rounded-[40px] shadow-sm mb-10 border-b-[12px] border-blue-500 transition-all duration-700">
            <h2 class="text-gray-400 font-medium mb-1">本月账单深度分析</h2>
            <div class="flex items-end gap-6">
                <span id="total-amount" class="text-7xl font-black text-blue-600 leading-none">￥0.00</span>
                <div id="ai-status" class="px-5 py-2 rounded-full bg-blue-100 text-blue-600 font-bold text-sm mb-2">待命</div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <section class="bg-white p-8 rounded-[32px] shadow-sm">
                <h3 class="font-bold text-lg mb-6 tracking-tight">📂 批量导入 (已优化)</h3>
                <div id="drop-zone" class="border-4 border-dashed border-blue-50 rounded-[24px] p-16 text-center hover:border-blue-400 hover:bg-blue-50 transition-all cursor-pointer">
                    <p id="upload-text" class="text-gray-400 font-medium italic">把你的 200 条账单丢进来试试</p>
                    <input type="file" id="file-input" class="hidden" accept=".xlsx, .xls">
                </div>
            </section>

            <section class="bg-white p-8 rounded-[32px] shadow-sm">
                <h3 class="font-bold text-lg mb-6">🧩 智能分类汇总</h3>
                <div id="category-list" class="space-y-4"></div>
            </section>
        </div>

        <div id="ai-bubble" class="mt-10 bg-white p-8 rounded-[32px] border-l-[16px] border-blue-500 shadow-lg relative">
            <p id="ai-comment" class="text-2xl text-gray-700 font-medium italic">“一次吃掉两百条账单，我的大脑已经准备好疯狂运算了！”</p>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');

        dropZone.onclick = () => fileInput.click();

        fileInput.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const apiKey = document.getElementById('api-key').value;
            if (!apiKey) { alert("请先填写 API Key！"); return; }

            document.getElementById('upload-text').innerText = "数据脱水中...";
            document.getElementById('ai-status').innerText = "正在压缩并传输...";

            const reader = new FileReader();
            reader.onload = async (event) => {
                const data = new Uint8Array(event.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                
                // 关键优化：只提取核心列，压缩体积
                const rawData = XLSX.utils.sheet_to_json(firstSheet);
                const compressedData = rawData.map(row => {
                    // 微信账单典型列名：'交易对方', '商品', '金额(元)', '收/支'
                    return `${row['交易对方'] || row['商户名称']}|${row['商品'] || row['商品名称']}|${row['金额(元)'] || row['金额']}|${row['收/支']}`;
                }).filter(line => line.includes('支出')).join('\n');

                console.log("压缩后的数据长度：", compressedData.length);
                analyzeWithAI(compressedData, apiKey);
            };
            reader.readAsArrayBuffer(file);
        };

        async function analyzeWithAI(processedText, apiKey) {
            const prompt = `你是一个精准的财务管家。请分析以下经过筛选的支出账单：
            1. 计算总支出金额。
            2. 严格按以下逻辑分类（忽略收入）：
               - '旅游出行'：包含地铁、携程、铁路、飞机、打车、滴滴、交通、12306、酒店。
               - '吃吃喝喝'：包含餐饮、外卖、瑞幸、便利店、超市、零食、饭店、食堂、星巴克。
               - '其他'：无法归入上述两类的支出。
            3. 输出JSON格式：{"total": 数字, "categories": {"旅游出行": 金额, "吃吃喝喝": 金额, "其他": 金额}, "comment": "一句幽默短评"}
            账单数据：\n${processedText}`;

            try {
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [{role: "system", content: "你是一个只返回JSON数据的会计助手。"}, {role: "user", content: prompt}],
                        temperature: 0.3,
                        response_format: { type: 'json_object' }
                    })
                });
                const data = await response.json();
                updateUI(JSON.parse(data.choices[0].message.content));
            } catch (err) {
                alert("AI 大脑宕机了，可能是数据太多或 Key 无效。");
                console.error(err);
            }
        }

        function updateUI(res) {
            const limit = document.getElementById('budget-limit').value;
            document.getElementById('total-amount').innerText = `￥${res.total.toFixed(2)}`;
            document.getElementById('ai-comment').innerText = `“${res.comment}”`;
            document.getElementById('ai-status').innerText = "分析完成";
            
            const icons = { '旅游出行': '✈️', '吃吃喝喝': '🍔', '其他': '📦' };
            document.getElementById('category-list').innerHTML = Object.entries(res.categories)
                .map(([k, v]) => `
                    <div class="flex items-center justify-between p-5 bg-gray-50 rounded-2xl">
                        <div class="flex items-center gap-3"><span>${icons[k]}</span><span class="font-bold">${k}</span></div>
                        <b>￥${v.toFixed(2)}</b>
                    </div>
                `).join('');

            const isOver = res.total > limit;
            document.getElementById('body-bg').className = isOver ? "bg-orange-50 flex h-screen" : "bg-blue-50 flex h-screen";
            document.getElementById('header-card').style.borderColor = isOver ? "#f97316" : "#3b82f6";
            document.getElementById('ai-status').className = isOver ? "px-5 py-2 rounded-full bg-orange-100 text-orange-600 font-bold text-sm mb-2" : "px-5 py-2 rounded-full bg-blue-100 text-blue-600 font-bold text-sm mb-2";
        }
    </script>
</body>
</html>
